[build]
  command = "yarn build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "#custom"
  command = "yarn vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
